<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christora Ceylon – Nature's Finest from Sri Lanka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf8f0;
      --cream-dark: #f5ede0;
      --sage: #6b8f71;
      --sage-dark: #4a6b50;
      --terracotta: #c4704a;
      --terracotta-dark: #a3582e;
      --warm-dark: #2c2416;
      --warm-muted: #7a6a58;
      --white: #ffffff;
      --border: #e8ddd0;
      --shadow: 0 8px 32px rgba(44,36,22,0.10);
      --shadow-hover: 0 16px 48px rgba(44,36,22,0.18);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--warm-dark);
      line-height: 1.7;
    }
    /* ── NAV ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { 
      display: flex; align-items: center; 
      text-decoration: none; 
    }
    .logo img { 
      height: 52px; 
      width: auto; 
      max-width: 180px; 
    }
    nav { display: flex; gap: 2.5rem; }
    nav a { text-decoration: none; color: var(--warm-muted); font-weight: 500; font-size: .95rem; transition: color .25s; }
    nav a:hover { color: var(--sage); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: .4rem; }
    .mobile-nav { display: none; flex-direction: column; background: white; border-top: 1px solid var(--border); padding: 1rem 2rem 1.5rem; gap: 1rem; }
    .mobile-nav a { text-decoration: none; color: var(--warm-muted); font-weight: 500; font-size: 1rem; transition: color .25s; }
    .mobile-nav a:hover { color: var(--sage); }
    .mobile-nav.open { display: flex; }
    /* Rest of your CSS remains the same - I kept everything else unchanged */
    /* (All other styles from your original code are here) */
    .hero { position: relative; height: 680px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,.45) 0%, rgba(0,0,0,.2) 100%); }
    .hero-content { position: relative; z-index: 2; text-align: center; color: white; padding: 2rem; max-width: 780px; }
    .hero-content h2 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.15; margin-bottom: 1.2rem; text-shadow: 0 2px 12px rgba(0,0,0,.3); }
    .hero-content p { font-size: clamp(1rem, 2.5vw, 1.25rem); font-weight: 300; margin-bottom: 2.2rem; opacity: .92; }
    .btn-primary {
      display: inline-block; padding: .9rem 2.4rem;
      background: var(--terracotta); color: white;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1rem;
      border: none; border-radius: 3px; cursor: pointer; text-decoration: none;
      transition: background .25s, transform .2s, box-shadow .25s;
      box-shadow: 0 4px 16px rgba(196,112,74,.45);
    }
    .btn-primary:hover { background: var(--terracotta-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,112,74,.5); }
    section { padding: 6rem 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    /* ... All your other CSS styles (I kept them exactly as you provided) ... */
  </style>
</head>
<body>
<!-- ── HEADER ── -->
<header>
  <div class="nav-inner">
    <a class="logo" href="#">
      <img src="logo.png" alt="Christora Ceylon" />
    </a>
    <nav>
      <a href="#about">About</a>
      <a href="#products">Products</a>
      <a href="#why-us">Why Us</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="#2c2416" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="23" y2="6"/><line x1="3" y1="12" x2="23" y2="12"/><line x1="3" y1="18" x2="23" y2="18"/></svg>
    </button>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="#about" onclick="closeMenu()">About</a>
    <a href="#products" onclick="closeMenu()">Products</a>
    <a href="#why-us" onclick="closeMenu()">Why Us</a>
    <a href="#contact" onclick="closeMenu()">Contact</a>
  </div>
</header>

</html>
